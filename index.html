<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no"><meta name="theme-color" content="#07111f"><link rel="manifest" href="manifest.json"><link rel="apple-touch-icon" href="icon-192.png"><link rel="stylesheet" href="style.css"><title>NEON INVADER</title></head><body><main class="app"><header><div><small>MOBILE SHOOTER</small><h1>NEON INVADER</h1></div><div><button id="pause">Ⅱ</button><button id="sound">🔊</button></div></header><section class="stats"><div>得点<b id="score">0</b></div><div>最高<b id="high">0</b></div><div>面<b id="level">1</b></div><div>残機<b id="lives">3</b></div></section><section class="game"><canvas id="c"></canvas><div id="start" class="overlay show"><div class="panel"><h2>敵をすべて倒そう</h2><p>◀▶で移動。FIREは長押しで連射します。</p><select id="difficulty"><option value="beginner">初心者</option><option value="normal">中級者</option><option value="advanced">上級者</option></select><button id="startBtn" class="primary">ゲーム開始</button></div></div><div id="msg" class="overlay"><div class="panel"><h2 id="msgTitle"></h2><p id="msgText"></p><button id="msgBtn" class="primary">続ける</button></div></div></section><section class="controls"><div><button id="left">◀</button><button id="right">▶</button></div><button id="fire" class="fire">FIRE</button></section></main><script src="game.js"></script></body></html>
